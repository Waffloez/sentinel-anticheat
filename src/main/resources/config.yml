violation-decay-seconds: 60

checks:
  speed:
    enabled: true
    max-blocks-per-second: 8.5
    violations-before-alert: 3
    block: true
    block-violations: 6

  fly:
    enabled: true
    max-airborne-ticks: 40
    violations-before-alert: 3
    block: true
    block-violations: 6

  reach:
    enabled: true
    max-distance: 4.0
    violations-before-alert: 2
    block: true
    block-violations: 3

  autoclicker:
    enabled: true
    max-clicks-per-second: 18
    violations-before-alert: 3

  killaura:
    enabled: true
    # If the angle between where the player is looking and where the
    # target actually is exceeds this, they're hitting something they
    # aren't looking at.
    max-aim-angle-degrees: 30
    # If a player lands hits on 2+ DIFFERENT entities within this many
    # milliseconds, that's beyond normal human reaction/aim switching.
    multi-hit-window-ms: 150
    violations-before-alert: 3

  macros:
    enabled: true
    # A macro's clicks are suspiciously perfectly-timed. This is the
    # max allowed timing consistency (standard deviation, in ms)
    # across recent clicks - lower stddev = more robotic.
    max-timing-consistency-ms: 8
    # Minimum click samples needed before judging consistency (avoids
    # false positives from too few data points).
    min-samples: 8
    violations-before-alert: 3

autoban:
  enabled: true
  total-violations: 15
  offend-reason: "cheats"
