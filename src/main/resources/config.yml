# Sentinel - basic anticheat configuration
#
# Each check has two thresholds:
#   violations-before-alert -> staff get notified in chat
#   block-violations        -> Sentinel actively interferes (rubber-band,
#                               cancel hit, etc). Kept higher than the
#                               alert threshold so it only blocks once
#                               it's confident, not on a single lag spike.
#
# On top of that, autoban below watches the COMBINED total violations
# across every check, and bans once that total gets high enough -
# kept much higher than any single check's block threshold, so it only
# fires on sustained, repeated cheating across the board.

violation-decay-seconds: 60

checks:
  speed:
    enabled: true
    max-blocks-per-second: 8.5
    violations-before-alert: 3
    block: true
    block-violations: 6

  fly:
    enabled: true
    max-airborne-ticks: 40
    violations-before-alert: 3
    block: true
    block-violations: 6

  reach:
    enabled: true
    max-distance: 4.0
    violations-before-alert: 2
    block: true
    block-violations: 3

  autoclicker:
    enabled: true
    max-clicks-per-second: 18
    violations-before-alert: 3
    # Blocking clicks isn't safe to automate - it would also interrupt
    # legitimate fast clickers. This check stays alert-only; review
    # flagged players yourself via /sus. It still counts toward autoban.

autoban:
  enabled: true
  # Combined violation count across ALL checks before a ban fires.
  total-violations: 15
  # LiteBans duration format (e.g. 7d, 30d), or "permanent".
  # If LiteBans isn't installed, this is ignored and it's always permanent.
  duration: "permanent"
  reason: "Automatically banned by Sentinel for repeated cheat detections"
